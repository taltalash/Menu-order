<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🍽️ Menu Order</title>
<link href="https://fonts.googleapis.com/css2?family=Frank+Ruhl+Libre:wght@400;700;900&family=Heebo:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
<style>
  :root {
    --cream: #faf6ef; --warm: #f2ebe0; --gold: #c9a84c;
    --dark: #1a1208; --mid: #4a3828; --light: #8a7060;
    --accent: #b85c38; --green: #4a7c59;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:'Heebo',sans-serif; background:var(--cream); color:var(--dark); min-height:100vh; }
  .screen { display:none; min-height:100vh; }
  .screen.active { display:block; }

  /* NAME */
  #nameScreen { background:var(--dark); display:flex; flex-direction:column; align-items:center; justify-content:center; padding:2rem; text-align:center; }
  #nameScreen.active { display:flex; }
  .logo { font-family:'Frank Ruhl Libre',serif; font-size:2.8rem; font-weight:900; color:var(--gold); margin-bottom:0.2rem; }
  .logo-sub { color:var(--light); font-size:0.82rem; letter-spacing:3px; text-transform:uppercase; margin-bottom:3rem; }
  .name-card { background:rgba(255,255,255,0.05); border:1px solid rgba(201,168,76,0.3); border-radius:16px; padding:2.5rem 2rem; width:100%; max-width:380px; }
  .name-card h2 { font-family:'Frank Ruhl Libre',serif; font-size:1.5rem; color:#fff; margin-bottom:0.5rem; }
  .name-card p { color:var(--light); font-size:0.9rem; margin-bottom:1.5rem; }
  .name-input { width:100%; padding:0.9rem 1rem; background:#fff; border:1px solid rgba(201,168,76,0.4); border-radius:10px; color:#1a1208; font-family:'Heebo',sans-serif; font-size:1rem; text-align:right; outline:none; margin-bottom:1rem; }
  .name-input::placeholder { color:#999; }
  .btn-primary { width:100%; padding:1rem; background:var(--gold); color:var(--dark); border:none; border-radius:10px; font-family:'Heebo',sans-serif; font-size:1rem; font-weight:700; cursor:pointer; }
  .btn-primary:disabled { opacity:0.4; cursor:not-allowed; }

  /* ADMIN MENU SETUP */
  #adminMenuScreen { background:var(--dark); }
  #adminMenuScreen.active { display:flex; flex-direction:column; min-height:100vh; }
  .admin-header { background:rgba(201,168,76,0.12); border-bottom:1px solid rgba(201,168,76,0.25); padding:1.5rem; text-align:center; }
  .admin-header h1 { font-family:'Frank Ruhl Libre',serif; font-size:1.6rem; color:var(--gold); }
  .admin-header p { color:rgba(255,255,255,0.45); font-size:0.82rem; margin-top:0.3rem; }
  .admin-body { padding:1.5rem; flex:1; overflow-y:auto; padding-bottom:6rem; }

  .admin-section { margin-bottom:1.8rem; }
  .admin-section-title { color:var(--gold); font-size:0.82rem; font-weight:700; letter-spacing:1px; text-transform:uppercase; margin-bottom:0.8rem; display:flex; align-items:center; gap:0.5rem; }

  /* PRESET */
  .restaurant-btn { display:flex; align-items:center; gap:0.8rem; background:rgba(255,255,255,0.04); border:1.5px solid rgba(201,168,76,0.15); border-radius:12px; padding:1rem 1.2rem; margin-bottom:0.6rem; cursor:pointer; transition:all 0.2s; width:100%; text-align:right; }
  .restaurant-btn:hover, .restaurant-btn.selected { border-color:var(--gold); background:rgba(201,168,76,0.08); }
  .r-icon { font-size:1.4rem; flex-shrink:0; }
  .r-name { font-weight:700; color:#fff; font-size:0.92rem; }
  .r-desc { font-size:0.73rem; color:rgba(255,255,255,0.35); margin-top:0.1rem; }
  .r-check { margin-right:auto; color:var(--gold); font-size:1rem; opacity:0; }
  .restaurant-btn.selected .r-check { opacity:1; }

  /* UPLOAD OPTIONS */
  .upload-tabs { display:flex; background:rgba(255,255,255,0.05); border-radius:12px; padding:0.3rem; margin-bottom:1rem; }
  .upload-tab { flex:1; padding:0.6rem; border:none; background:transparent; color:rgba(255,255,255,0.4); font-family:'Heebo',sans-serif; font-size:0.82rem; cursor:pointer; border-radius:8px; transition:all 0.2s; }
  .upload-tab.active { background:var(--gold); color:var(--dark); font-weight:700; }

  .upload-panel { display:none; }
  .upload-panel.active { display:block; }

  .url-input { width:100%; padding:0.9rem 1rem; background:rgba(255,255,255,0.06); border:1.5px solid rgba(201,168,76,0.2); border-radius:10px; color:#fff; font-family:'Heebo',sans-serif; font-size:0.88rem; outline:none; direction:ltr; margin-bottom:0.8rem; }
  .url-input:focus { border-color:var(--gold); }
  .url-input::placeholder { color:rgba(255,255,255,0.25); }

  .menu-name-input { width:100%; padding:0.8rem 1rem; background:rgba(255,255,255,0.06); border:1.5px solid rgba(201,168,76,0.2); border-radius:10px; color:#fff; font-family:'Heebo',sans-serif; font-size:0.88rem; outline:none; margin-bottom:0.8rem; }
  .menu-name-input:focus { border-color:var(--gold); }
  .menu-name-input::placeholder { color:rgba(255,255,255,0.25); }

  .photo-upload-area { border:2px dashed rgba(201,168,76,0.3); border-radius:12px; padding:2rem; text-align:center; cursor:pointer; transition:all 0.2s; margin-bottom:0.8rem; }
  .photo-upload-area:hover { border-color:var(--gold); background:rgba(201,168,76,0.05); }
  .photo-upload-area .upload-icon { font-size:2.5rem; margin-bottom:0.5rem; }
  .photo-upload-area p { color:rgba(255,255,255,0.5); font-size:0.85rem; }
  .photo-upload-area strong { color:var(--gold); }
  #photoInput { display:none; }

  .photo-previews { display:flex; flex-wrap:wrap; gap:0.5rem; margin-bottom:0.8rem; }
  .photo-thumb { position:relative; width:80px; height:80px; border-radius:8px; overflow:hidden; }
  .photo-thumb img { width:100%; height:100%; object-fit:cover; }
  .photo-thumb .remove-photo { position:absolute; top:2px; right:2px; background:rgba(0,0,0,0.7); color:#fff; border:none; border-radius:50%; width:18px; height:18px; font-size:0.65rem; cursor:pointer; display:flex; align-items:center; justify-content:center; }

  .ai-btn { width:100%; padding:0.9rem; background:rgba(201,168,76,0.15); border:1.5px solid var(--gold); border-radius:10px; color:var(--gold); font-family:'Heebo',sans-serif; font-size:0.88rem; font-weight:700; cursor:pointer; transition:all 0.2s; margin-bottom:0.5rem; }
  .ai-btn:hover { background:rgba(201,168,76,0.25); }
  .ai-btn:disabled { opacity:0.4; cursor:not-allowed; }

  .ai-status { font-size:0.78rem; color:rgba(255,255,255,0.4); text-align:center; min-height:1.2rem; }
  .ai-status.loading { color:var(--gold); animation:pulse 1.5s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

  .extracted-preview { background:rgba(255,255,255,0.04); border:1px solid rgba(201,168,76,0.2); border-radius:12px; padding:1rem; margin-top:0.8rem; max-height:200px; overflow-y:auto; }
  .extracted-preview h4 { color:var(--gold); font-size:0.82rem; margin-bottom:0.5rem; }
  .extracted-item { font-size:0.78rem; color:rgba(255,255,255,0.6); padding:0.2rem 0; border-bottom:1px solid rgba(255,255,255,0.05); display:flex; justify-content:space-between; }
  .extracted-item:last-child { border-bottom:none; }

  .admin-float { position:fixed; bottom:0; left:0; right:0; background:rgba(26,18,8,0.96); backdrop-filter:blur(10px); border-top:1px solid rgba(201,168,76,0.15); padding:1rem 1.5rem; display:flex; gap:0.8rem; z-index:200; }
  .btn-admin-go { flex:2; padding:0.9rem; background:var(--gold); color:var(--dark); border:none; border-radius:10px; font-family:'Heebo',sans-serif; font-weight:700; font-size:0.95rem; cursor:pointer; }
  .btn-admin-go:disabled { opacity:0.4; cursor:not-allowed; }
  .btn-admin-skip { flex:1; padding:0.9rem; background:rgba(255,255,255,0.06); color:rgba(255,255,255,0.5); border:1.5px solid rgba(255,255,255,0.1); border-radius:10px; font-family:'Heebo',sans-serif; font-size:0.85rem; cursor:pointer; }

  /* SYNC */
  .sync-dot { display:inline-block; width:8px; height:8px; border-radius:50%; background:#aaa; margin-left:6px; vertical-align:middle; }
  .sync-dot.synced { background:#4a7c59; }
  .sync-dot.syncing { background:var(--gold); animation:pulse2 1s infinite; }
  @keyframes pulse2 { 0%,100%{opacity:1} 50%{opacity:0.3} }

  /* MENU HEADER */
  .menu-header { background:var(--dark); padding:1rem 1.5rem; display:flex; align-items:center; justify-content:space-between; position:sticky; top:0; z-index:100; }
  .menu-header-title { font-family:'Frank Ruhl Libre',serif; font-size:1.1rem; color:var(--gold); font-weight:700; }
  .menu-header-name { color:rgba(255,255,255,0.6); font-size:0.75rem; }
  .cart-btn { background:var(--gold); color:var(--dark); border:none; border-radius:50px; padding:0.45rem 1rem; font-family:'Heebo',sans-serif; font-weight:700; font-size:0.82rem; cursor:pointer; display:flex; align-items:center; gap:0.4rem; flex-shrink:0; }
  .cart-count { background:var(--dark); color:var(--gold); border-radius:50%; width:20px; height:20px; display:flex; align-items:center; justify-content:center; font-size:0.72rem; font-weight:900; }

  .admin-bar { background:rgba(201,168,76,0.1); border-bottom:1px solid rgba(201,168,76,0.2); padding:0.5rem 1.2rem; font-size:0.78rem; color:var(--mid); display:flex; align-items:center; gap:0.6rem; flex-wrap:wrap; }
  .change-menu-btn { background:var(--gold); color:var(--dark); border:none; border-radius:50px; padding:0.2rem 0.7rem; font-family:'Heebo',sans-serif; font-size:0.72rem; font-weight:700; cursor:pointer; }
  .clear-btn { background:#c0392b; color:#fff; border:none; border-radius:50px; padding:0.2rem 0.7rem; font-family:'Heebo',sans-serif; font-size:0.72rem; cursor:pointer; margin-right:auto; }

  .category-nav { display:flex; gap:0.5rem; padding:0.8rem 1.2rem; overflow-x:auto; background:var(--warm); border-bottom:1px solid rgba(0,0,0,0.08); scrollbar-width:none; }
  .category-nav::-webkit-scrollbar { display:none; }
  .cat-btn { flex-shrink:0; padding:0.35rem 0.9rem; background:#fff; border:1.5px solid rgba(0,0,0,0.1); border-radius:50px; font-family:'Heebo',sans-serif; font-size:0.78rem; font-weight:500; cursor:pointer; transition:all 0.15s; color:var(--mid); white-space:nowrap; }
  .cat-btn.active,.cat-btn:hover { background:var(--dark); color:var(--gold); border-color:var(--dark); }

  .menu-body { padding:0 0 7rem; }
  .category-section { padding:1.2rem 1.2rem 0.3rem; }
  .category-title { font-family:'Frank Ruhl Libre',serif; font-size:1.25rem; font-weight:700; color:var(--dark); margin-bottom:0.5rem; display:flex; align-items:center; gap:0.5rem; }
  .category-title::after { content:''; flex:1; height:1px; background:var(--gold); opacity:0.3; }
  .section-divider { height:6px; background:var(--warm); margin:0.3rem 0; }

  .menu-item { background:#fff; border-radius:12px; padding:0.9rem 1rem; margin-bottom:0.6rem; display:flex; align-items:flex-start; gap:0.8rem; border:2px solid transparent; transition:all 0.2s; cursor:pointer; box-shadow:0 1px 4px rgba(0,0,0,0.06); }
  .menu-item.selected { border-color:var(--green); background:#f0f8f2; }
  .menu-item:active { transform:scale(0.99); }
  .item-check { width:24px; height:24px; border-radius:50%; border:2px solid #ddd; display:flex; align-items:center; justify-content:center; flex-shrink:0; transition:all 0.2s; font-size:0.8rem; margin-top:1px; }
  .menu-item.selected .item-check { background:var(--green); border-color:var(--green); color:#fff; }
  .item-info { flex:1; min-width:0; }
  .item-name { font-weight:700; font-size:0.9rem; color:var(--dark); line-height:1.3; }
  .item-en { font-size:0.73rem; color:var(--gold); font-style:italic; margin-top:0.1rem; }
  .item-desc { font-size:0.73rem; color:var(--light); margin-top:0.05rem; }
  .item-price-tag { font-family:'Frank Ruhl Libre',serif; font-weight:700; font-size:0.95rem; color:var(--accent); margin-top:0.2rem; }
  .item-controls { margin-top:0.6rem; display:flex; flex-direction:column; gap:0.4rem; }
  .qty-row { display:flex; align-items:center; gap:0.5rem; }
  .qty-label { font-size:0.75rem; color:var(--mid); }
  .qty-btns { display:flex; align-items:center; gap:0.3rem; }
  .qty-btn { width:28px; height:28px; border-radius:50%; border:1.5px solid var(--green); background:#fff; color:var(--green); font-size:1rem; font-weight:700; cursor:pointer; display:flex; align-items:center; justify-content:center; }
  .qty-btn:active { background:var(--green); color:#fff; }
  .qty-num { font-weight:700; font-size:0.95rem; color:var(--dark); min-width:20px; text-align:center; }
  .note-input { width:100%; padding:0.3rem 0.6rem; border:1.5px solid #ddd; border-radius:8px; font-family:'Heebo',sans-serif; font-size:0.78rem; color:var(--dark); background:#fafafa; outline:none; }
  .note-input:focus { border-color:var(--gold); }

  .page-header { background:var(--dark); padding:1.3rem 1.5rem; text-align:center; }
  .page-header h1 { font-family:'Frank Ruhl Libre',serif; font-size:1.6rem; color:var(--gold); }
  .page-header p { color:rgba(255,255,255,0.5); font-size:0.82rem; margin-top:0.2rem; }
  .page-body { padding:1.2rem; max-width:680px; margin:0 auto; padding-bottom:7rem; }

  .tab-bar { display:flex; background:var(--dark); border-radius:50px; padding:0.3rem; margin-bottom:1.2rem; }
  .tab-bar-btn { flex:1; padding:0.55rem; border:none; background:transparent; color:rgba(255,255,255,0.5); font-family:'Heebo',sans-serif; font-size:0.78rem; font-weight:500; cursor:pointer; border-radius:50px; transition:all 0.2s; }
  .tab-bar-btn.active { background:var(--gold); color:var(--dark); font-weight:700; }

  .filter-bar { display:flex; gap:0.4rem; margin-bottom:0.8rem; overflow-x:auto; scrollbar-width:none; flex-wrap:wrap; }
  .filter-btn { flex-shrink:0; padding:0.28rem 0.75rem; background:#fff; border:1.5px solid #ddd; border-radius:50px; font-family:'Heebo',sans-serif; font-size:0.74rem; cursor:pointer; color:var(--mid); white-space:nowrap; }
  .filter-btn.active { background:var(--dark); color:var(--gold); border-color:var(--dark); }

  .person-order { background:#fff; border-radius:14px; padding:1.1rem; margin-bottom:0.9rem; box-shadow:0 2px 8px rgba(0,0,0,0.07); }
  .person-name-row { font-family:'Frank Ruhl Libre',serif; font-size:1rem; font-weight:700; color:var(--dark); margin-bottom:0.7rem; padding-bottom:0.4rem; border-bottom:1px solid #eee; display:flex; align-items:center; gap:0.5rem; }
  .person-total { font-size:0.82rem; color:var(--accent); font-weight:600; margin-right:auto; }
  .order-item-row { padding:0.4rem 0; border-bottom:1px dashed #f0ebe3; }
  .order-item-row:last-child { border-bottom:none; }
  .order-item-top { display:flex; justify-content:space-between; align-items:center; gap:0.4rem; }
  .order-item-name { font-size:0.86rem; color:var(--dark); font-weight:600; flex:1; }
  .order-item-right { display:flex; align-items:center; gap:0.4rem; flex-shrink:0; }
  .order-item-price { color:var(--accent); font-weight:600; font-size:0.83rem; }
  .del-btn { background:none; border:none; color:#ddd; font-size:0.85rem; cursor:pointer; }
  .del-btn:hover { color:#c0392b; }
  .order-item-note { font-size:0.72rem; color:var(--green); margin-top:0.12rem; }
  .note-edit { width:100%; margin-top:0.3rem; padding:0.25rem 0.5rem; border:1.5px solid #eee; border-radius:6px; font-family:'Heebo',sans-serif; font-size:0.75rem; color:var(--dark); outline:none; }
  .note-edit:focus { border-color:var(--gold); }

  .dish-card { background:#fff; border-radius:12px; padding:0.9rem 1.1rem; margin-bottom:0.7rem; box-shadow:0 2px 8px rgba(0,0,0,0.07); }
  .dish-count { display:inline-block; background:var(--gold); color:var(--dark); border-radius:50px; padding:0.05rem 0.6rem; font-size:0.78rem; font-weight:700; margin-left:0.4rem; }
  .dish-name { font-weight:700; font-size:0.93rem; color:var(--dark); }
  .dish-en { font-size:0.72rem; color:var(--gold); font-style:italic; margin-top:0.1rem; }
  .dish-people { font-size:0.78rem; color:var(--light); margin-top:0.25rem; }
  .dish-notes { font-size:0.73rem; color:var(--green); margin-top:0.2rem; }
  .cat-group-title { font-family:'Frank Ruhl Libre',serif; font-size:1.05rem; color:var(--dark); margin:1.2rem 0 0.5rem; padding-bottom:0.3rem; border-bottom:1px solid rgba(201,168,76,0.3); }

  .grand-total-box { background:var(--dark); color:#fff; border-radius:14px; padding:1.1rem 1.4rem; display:flex; justify-content:space-between; align-items:center; margin-top:1.3rem; margin-bottom:1.3rem; }
  .grand-total-label { font-size:0.95rem; color:rgba(255,255,255,0.65); }
  .grand-total-amount { font-family:'Frank Ruhl Libre',serif; font-size:1.7rem; color:var(--gold); font-weight:700; }

  .empty-state { text-align:center; padding:3rem 1.5rem; color:var(--light); }
  .empty-state .emoji { font-size:2.5rem; margin-bottom:0.8rem; display:block; }

  .float-btn-bar { position:fixed; bottom:0; left:0; right:0; background:rgba(250,246,239,0.96); backdrop-filter:blur(10px); border-top:1px solid rgba(0,0,0,0.08); padding:0.9rem 1.2rem; display:flex; gap:0.7rem; z-index:200; }
  .btn-secondary { flex:1; padding:0.8rem; background:#fff; border:1.5px solid var(--dark); border-radius:10px; font-family:'Heebo',sans-serif; font-weight:600; font-size:0.85rem; cursor:pointer; color:var(--dark); }
  .btn-success { flex:2; padding:0.8rem; background:var(--green); border:none; border-radius:10px; font-family:'Heebo',sans-serif; font-weight:700; font-size:0.88rem; cursor:pointer; color:#fff; }
  .btn-gold { flex:1; padding:0.8rem; background:var(--gold); border:none; border-radius:10px; font-family:'Heebo',sans-serif; font-weight:700; font-size:0.85rem; cursor:pointer; color:var(--dark); }

  .toast { position:fixed; bottom:5.5rem; left:50%; transform:translateX(-50%) translateY(100px); background:var(--dark); color:#fff; padding:0.65rem 1.4rem; border-radius:50px; font-size:0.82rem; z-index:999; transition:transform 0.3s ease; white-space:nowrap; }
  .toast.show { transform:translateX(-50%) translateY(0); }

  .loading-overlay { position:fixed; inset:0; background:var(--dark); display:flex; flex-direction:column; align-items:center; justify-content:center; z-index:9999; color:#fff; gap:1rem; }
  .loading-overlay.hidden { display:none; }
  .spinner { width:38px; height:38px; border:3px solid rgba(201,168,76,0.3); border-top-color:var(--gold); border-radius:50%; animation:spin 0.8s linear infinite; }
  @keyframes spin { to { transform:rotate(360deg); } }
  .loading-text { color:var(--gold); font-family:'Frank Ruhl Libre',serif; font-size:1.1rem; text-align:center; padding:0 1rem; }
</style>
</head>
<body>

<div class="toast" id="toast"></div>
<div class="loading-overlay hidden" id="loadingOverlay">
  <div style="font-size:2.5rem">🍽️</div>
  <div class="spinner"></div>
  <div class="loading-text" id="loadingText">מתחבר...</div>
</div>

<!-- NAME -->
<div class="screen active" id="nameScreen">
  <div class="logo">🍽️ Menu Order</div>
  <div class="logo-sub">Restaurant Ordering App</div>
  <div class="name-card">
    <h2>ברוך הבא!</h2>
    <p>הכנס את שמך כדי להתחיל לסמן מנות</p>
    <input type="text" class="name-input" id="nameInput" placeholder="שמך..." maxlength="30" />
    <button class="btn-primary" id="startBtn" disabled onclick="startOrdering()">התחל לבחור 🍴</button>
  </div>
</div>

<!-- ADMIN MENU SETUP -->
<div class="screen" id="adminMenuScreen">
  <div class="admin-header">
    <h1>👑 ניהול תפריט</h1>
    <p>בחרי תפריט קיים או טעיני חדש</p>
  </div>
  <div class="admin-body">

    <!-- SAVED PRESETS -->
    <div class="admin-section">
      <div class="admin-section-title">📋 תפריטים שמורים</div>
      <button class="restaurant-btn selected" id="preset-lafinca" onclick="selectPreset('lafinca')">
        <span class="r-icon">🌿</span>
        <div style="text-align:right">
          <div class="r-name">La Finca — Los Realejos</div>
          <div class="r-desc">ראשונות · בשר · דגים · קינוחים</div>
        </div>
        <span class="r-check">✓</span>
      </button>
      <button class="restaurant-btn" id="preset-custom" onclick="selectPreset('custom')" style="display:none">
        <span class="r-icon">⭐</span>

// ---- URL EXTRACTION ----
async function extractFromUrl() {
  const url = document.getElementById('menuUrl').value.trim();
  if (!url) { showToast('הכניסי לינק תחילה'); return; }
  const name = document.getElementById('newMenuName').value.trim() || 'תפריט';

  setStatus('urlStatus', 'loading', '🤖 AI קורא את התפריט...');
  document.getElementById('urlBtn').disabled = true;

  try {
    const prompt = `You are a menu extraction assistant. Fetch and read the restaurant menu from this URL: ${url}

Extract ALL menu items and organize them into categories. Return ONLY a valid JSON array (no markdown, no explanation) in this exact format:
[
  {
    "id": "category_id",
    "name": "Category Name in Hebrew",
    "icon": "🍽️",
    "items": [
      {"id": 1, "name": "Dish name in Hebrew", "en": "Original dish name", "price": 12.50}
    ]
  }
]

Rules:
- Translate dish names to Hebrew
- Keep original names in "en" field
- Use numeric IDs starting from 1 (unique across all items)
- Convert all prices to numbers (remove currency symbols)
- Choose appropriate emoji icons for categories
- Return ONLY the JSON array, nothing else`;

    const response = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 4000,
        tools: [{ type: 'web_search_20250305', name: 'web_search' }],
        messages: [{ role: 'user', content: prompt }]
      })
    });

    const data = await response.json();
    const text = data.content.filter(b => b.type === 'text').map(b => b.text).join('');
    const jsonMatch = text.match(/\[[\s\S]*\]/);
    if (!jsonMatch) throw new Error('No JSON found');

    extractedMenu = JSON.parse(jsonMatch[0]);
    showExtractedPreview(name, extractedMenu);
    setStatus('urlStatus', '', '✅ תפריט זוהה בהצלחה!');
  } catch(e) {
    setStatus('urlStatus', '', '❌ שגיאה בקריאת התפריט. נסי שוב.');
    console.error(e);
  }
  document.getElementById('urlBtn').disabled = false;
}

// ---- PHOTO EXTRACTION ----
function handlePhotoUpload(event) {
  const files = Array.from(event.target.files);
  files.forEach(file => {
    const reader = new FileReader();
    reader.onload = e => {
      uploadedPhotos.push({ base64: e.target.result.split(',')[1], type: file.type });
      renderPhotoThumbs();
    };
    reader.readAsDataURL(file);
  });
}

function renderPhotoThumbs() {
  const container = document.getElementById('photoPreviews');
  container.innerHTML = '';
  uploadedPhotos.forEach((photo, i) => {
    const thumb = document.createElement('div');
    thumb.className = 'photo-thumb';
    thumb.innerHTML = `<img src="data:${photo.type};base64,${photo.base64}">
      <button class="remove-photo" onclick="removePhoto(${i})">✕</button>`;
    container.appendChild(thumb);
  });
  document.getElementById('photoBtn').disabled = uploadedPhotos.length === 0;
}

function removePhoto(i) {
  uploadedPhotos.splice(i, 1);
  renderPhotoThumbs();
}

async function extractFromPhotos() {
  if (!uploadedPhotos.length) return;
  const name = document.getElementById('newMenuName').value.trim() || 'תפריט';

  setStatus('photoStatus', 'loading', '🤖 AI קורא את התמונות...');
  document.getElementById('photoBtn').disabled = true;

  try {
    const imageContent = uploadedPhotos.map(p => ({
      type: 'image',
      source: { type: 'base64', media_type: p.type, data: p.base64 }
    }));

    imageContent.push({
      type: 'text',
      text: `These are screenshots of a restaurant menu. Extract ALL menu items from ALL images.
Return ONLY a valid JSON array (no markdown, no explanation) in this exact format:
[
  {
    "id": "category_id",
    "name": "Category Name in Hebrew",
    "icon": "🍽️",
    "items": [
      {"id": 1, "name": "Dish name in Hebrew", "en": "Original dish name", "price": 12.50}
    ]
  }
]
Rules: translate names to Hebrew, keep originals in "en", use unique numeric IDs, convert prices to numbers, choose emoji icons. Return ONLY the JSON array.`
    });

    const response = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 4000,
        messages: [{ role: 'user', content: imageContent }]
      })
    });

    const data = await response.json();
    const text = data.content.filter(b => b.type === 'text').map(b => b.text).join('');
    const jsonMatch = text.match(/\[[\s\S]*\]/);
    if (!jsonMatch) throw new Error('No JSON found');

    extractedMenu = JSON.parse(jsonMatch[0]);
    showExtractedPreview(name, extractedMenu);
    setStatus('photoStatus', '', '✅ תפריט זוהה בהצלחה!');
  } catch(e) {
    setStatus('photoStatus', '', '❌ שגיאה. נסי שוב.');
    console.error(e);
  }
  document.getElementById('photoBtn').disabled = false;
}

function showExtractedPreview(name, menu) {
  const preview = document.getElementById('extractedPreview');
  const title = document.getElementById('extractedTitle');
  const items = document.getElementById('extractedItems');
  preview.style.display = 'block';
  const total = menu.reduce((s, cat) => s + cat.items.length, 0);
  title.textContent = '✅ ' + total + ' מנות זוהו';
  items.innerHTML = '';
  menu.slice(0, 4).forEach(cat => {
    const div = document.createElement('div');
    div.style.cssText = 'color:rgba(255,255,255,0.5);font-size:0.75rem;margin-bottom:0.3rem;';
    div.textContent = (cat.icon||'') + ' ' + cat.name + ' (' + cat.items.length + ' מנות)';
    items.appendChild(div);
  });
  if (menu.length > 4) {
    const more = document.createElement('div');
    more.style.cssText = 'color:rgba(255,255,255,0.3);font-size:0.72rem;';
    more.textContent = '+ ' + (menu.length - 4) + ' קטגוריות נוספות';
    items.appendChild(more);
  }
}

function setStatus(id, cls, msg) {
  const el = document.getElementById(id);
  if (!el) return;
  el.className = 'ai-status' + (cls ? ' ' + cls : '');
  el.textContent = msg;
}

function skipToMenu() {
  setLoading(true, 'טוען תפריט...');
  db.ref('currentMenu').once('value', snap => {
    const data = snap.val();
    if (data && data.menu) { currentMenu = data.menu; currentMenuName = data.name || 'Menu'; }
    else { currentMenu = LAFINCA_MENU; currentMenuName = 'La Finca — Los Realejos'; }
    setLoading(false);
    initMenuScreen();
  });
}

async function applyMenu() {
  let menuToSave = null;
  let nameToSave = document.getElementById('newMenuName').value.trim();

  if (extractedMenu) {
    menuToSave = extractedMenu;
    if (!nameToSave) nameToSave = 'תפריט מותאם';
  } else if (selectedPreset === 'lafinca') {
    menuToSave = LAFINCA_MENU;
    nameToSave = 'La Finca — Los Realejos';
  } else if (selectedPreset === 'custom') {
    // load from Firebase
    setLoading(true, 'טוען...');
    db.ref('currentMenu').once('value', snap => {
      const data = snap.val();
      if (data && data.menu) { currentMenu = data.menu; currentMenuName = data.name; }
      setLoading(false);
      initMenuScreen();
    });
    return;
  } else {
    showToast('בחרי תפריט או העלי קובץ');
    return;
  }

  setLoading(true, 'שומר תפריט...');
  try {
    await db.ref('currentMenu').set({ name: nameToSave, menu: menuToSave });
    currentMenu = menuToSave;
    currentMenuName = nameToSave;
    setLoading(false);
    showToast('✅ תפריט הוגדר!');
    initMenuScreen();
  } catch(e) {
    setLoading(false);
    showToast('❌ שגיאה בשמירה');
  }
}

// ============================================================
// MENU SCREEN
// ============================================================
function initMenuScreen() {
  document.getElementById('restaurantTitle').innerHTML =
    '🍽️ ' + currentMenuName + ' <span class="sync-dot synced" id="syncDot"></span>';
  document.getElementById('headerName').textContent =
    'שלום, ' + currentUser + (isAdmin ? ' 👑' : '') + '!';
  if (isAdmin) document.getElementById('adminBar').style.display = 'flex';

  db.ref('orders').on('value', snapshot => {
    const raw = snapshot.val() || {};
    allOrders = {};
    Object.entries(raw).forEach(([user, orders]) => {
      allOrders[user] = {};
      Object.entries(orders).forEach(([itemId, o]) => {
        const item = resolveItem(o.itemId || itemId);
        if (item) allOrders[user][itemId] = { item, qty: o.qty||1, note: o.note||'' };
      });
    });
    if (!allOrders[currentUser]) allOrders[currentUser] = {};
    setSynced();

    const onMenu   = document.getElementById('menuScreen').classList.contains('active');
    const onSum    = document.getElementById('summaryScreen').classList.contains('active');
    const onReport = document.getElementById('reportScreen').classList.contains('active');

    if (!onMenu && !onSum && !onReport) { buildMenu(); showScreen('menuScreen'); }
    else {
      if (onMenu) { rebuildMenuSelections(); updateCartCount(); }
      if (onSum)  renderSummary();
      if (onReport) renderReport();
    }
  });
}

function saveOrders(user) {
  setSyncing();
  const plain = {};
  Object.entries(allOrders[user]||{}).forEach(([id, o]) => {
    plain[id] = { itemId: o.item.id, qty: o.qty||1, note: o.note||'' };
  });
  const r = Object.keys(plain).length
    ? db.ref('orders/'+user).set(plain)
    : db.ref('orders/'+user).remove();
  r.then(setSynced).catch(() => showToast('⚠️ שגיאת שמירה'));
}

function clearAll() {
  if (!confirm('למחוק את כל ההזמנות?')) return;
  db.ref('orders').remove().then(() => showToast('🗑️ נמחק'));
}

function buildMenu() {
  const nav = document.getElementById('categoryNav');
  const body = document.getElementById('menuBody');
  nav.innerHTML = ''; body.innerHTML = '';
  currentMenu.forEach((cat, ci) => {
    const btn = document.createElement('button');
    btn.className = 'cat-btn' + (ci===0?' active':'');
    btn.textContent = (cat.icon||'🍽️') + ' ' + cat.name;
    btn.onclick = () => {
      document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      document.getElementById('cat-'+cat.id).scrollIntoView({behavior:'smooth',block:'start'});
    };
    nav.appendChild(btn);

    const sec = document.createElement('div');
    sec.className = 'category-section'; sec.id = 'cat-'+cat.id;
    const title = document.createElement('div');
    title.className = 'category-title';
    title.textContent = (cat.icon||'') + ' ' + cat.name;
    sec.appendChild(title);
    cat.items.forEach(item => sec.appendChild(buildMenuItem(item)));
    body.appendChild(sec);
    if (ci < currentMenu.length-1) { const d = document.createElement('div'); d.className='section-divider'; body.appendChild(d); }
  });
  updateCartCount();
}

function rebuildMenuSelections() {
  currentMenu.forEach(cat => cat.items.forEach(item => {
    const el = document.getElementById('item-'+item.id);
    if (el) el.replaceWith(buildMenuItem(item));
  }));
}

function buildMenuItem(item) {
  const order = allOrders[currentUser]||{};
  const entry = order[item.id];
  const sel = !!entry;
  const el = document.createElement('div');
  el.className = 'menu-item' + (sel?' selected':'');
  el.id = 'item-'+item.id;

  let ctrl = '';
  if (sel) {
    ctrl = '<div class="item-controls" onclick="event.stopPropagation()">' +
      '<div class="qty-row"><span class="qty-label">כמות:</span>' +
      '<div class="qty-btns">' +
      '<button class="qty-btn" onclick="changeQty('+item.id+',-1)">−</button>' +
      '<span class="qty-num" id="qty-'+item.id+'">'+(entry.qty||1)+'</span>' +
      '<button class="qty-btn" onclick="changeQty('+item.id+',1)">+</button>' +
      '</div></div>' +
      '<input class="note-input" placeholder="💬 הערה (ללא בצל, רוטב בצד...)" value="'+(entry.note||'').replace(/"/g,'&quot;')+'" onchange="updateNote(event,'+item.id+')" />' +
      '</div>';
  }

  el.innerHTML =
    '<div class="item-check">'+(sel?'✓':'')+'</div>' +
    '<div class="item-info">' +
      '<div class="item-name">'+item.name+'</div>' +
      (item.en?'<div class="item-en">'+item.en+'</div>':'') +
      (item.desc?'<div class="item-desc">'+item.desc+'</div>':'') +
      '<div class="item-price-tag">'+Number(item.price).toFixed(2)+'€</div>' +
      ctrl +
    '</div>';

  el.onclick = () => toggleItem(item);
  return el;
}

function toggleItem(item) {
  if (!allOrders[currentUser]) allOrders[currentUser] = {};
  if (allOrders[currentUser][item.id]) delete allOrders[currentUser][item.id];
  else allOrders[currentUser][item.id] = { item, qty:1, note:'' };
  saveOrders(currentUser);
  const el = document.getElementById('item-'+item.id);
  if (el) el.replaceWith(buildMenuItem(item));
  updateCartCount();
}

function changeQty(itemId, delta) {
  if (!allOrders[currentUser]||!allOrders[currentUser][itemId]) return;
  const e = allOrders[currentUser][itemId];
  e.qty = Math.max(1,(e.qty||1)+delta);
  const el = document.getElementById('qty-'+itemId);
  if (el) el.textContent = e.qty;
  saveOrders(currentUser);
}

function updateNote(ev, itemId) {
  if (allOrders[currentUser]&&allOrders[currentUser][itemId])
    allOrders[currentUser][itemId].note = ev.target.value;
  saveOrders(currentUser);
}

function updateCartCount() {
  document.getElementById('cartCount').textContent = Object.keys(allOrders[currentUser]||{}).length;
}

// ============================================================
// SUMMARY
// ============================================================
function goToSummary() {
  document.getElementById('summaryTime').textContent = new Date().toLocaleString('he-IL');
  renderSummary(); showScreen('summaryScreen');
}

function showSummaryTab(tab) {
  currentSummaryTab = tab;
  document.querySelectorAll('.tab-bar-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('tab-'+tab).classList.add('active');
  renderSummary();
}

function renderSummary() {
  const content = document.getElementById('summaryContent');
  content.innerHTML = '';
  currentSummaryTab==='byPerson' ? renderByPerson(content) : renderByDish(content);
}

function renderByPerson(container) {
  const users = Object.keys(allOrders);
  if (!users.length) { container.innerHTML = emptyHTML(); return; }
  let grand = 0;
  users.forEach(user => {
    const items = Object.values(allOrders[user]);
    if (!items.length) return;
    const total = items.reduce((s,o) => s+o.item.price*(o.qty||1), 0);
    grand += total;
    const canEdit = user===currentUser || isAdmin;
    const box = document.createElement('div');
    box.className = 'person-order';
    const nr = document.createElement('div');
    nr.className = 'person-name-row';
    nr.innerHTML = '👤 '+user+'<span class="person-total">'+total.toFixed(2)+'€</span>';
    box.appendChild(nr);

    items.forEach(o => {
      const row = document.createElement('div'); row.className = 'order-item-row';
      const top = document.createElement('div'); top.className = 'order-item-top';
      const nd = document.createElement('div'); nd.className = 'order-item-name';
      nd.textContent = o.item.name + (o.qty>1?' ×'+o.qty:'');
      top.appendChild(nd);
      const right = document.createElement('div'); right.className = 'order-item-right';
      right.innerHTML = '<span class="order-item-price">'+(o.item.price*(o.qty||1)).toFixed(2)+'€</span>';
      if (canEdit) {
        const d = document.createElement('button'); d.className='del-btn'; d.textContent='✕';
        d.onclick = () => { delete allOrders[user][o.item.id]; saveOrders(user); renderSummary(); if(user===currentUser) updateCartCount(); };
        right.appendChild(d);
      }
      top.appendChild(right); row.appendChild(top);
      if (canEdit) {
        const ni = document.createElement('input'); ni.className='note-edit';
        ni.placeholder='💬 הוסף הערה...'; ni.value=o.note||'';
        ni.onchange = ev => { if(allOrders[user]&&allOrders[user][o.item.id]) { allOrders[user][o.item.id].note=ev.target.value; saveOrders(user); } };
        row.appendChild(ni);
      } else if (o.note) {
        const nd2=document.createElement('div'); nd2.className='order-item-note'; nd2.textContent='💬 '+o.note; row.appendChild(nd2);
      }
      box.appendChild(row);
    });
    container.appendChild(box);
  });
  const gt=document.createElement('div'); gt.className='grand-total-box';
  gt.innerHTML='<span class="grand-total-label">סה״כ לתשלום</span><span class="grand-total-amount">'+grand.toFixed(2)+'€</span>';
  container.appendChild(gt);
}

function renderByDish(container) {
  const map = buildDishMap(allOrders);
  if (!Object.keys(map).length) { container.innerHTML=emptyHTML(); return; }
  Object.values(map).sort((a,b)=>b.totalQty-a.totalQty).forEach(d => {
    const card=document.createElement('div'); card.className='dish-card';
    const notesArr=d.notes.map((n,i)=>n?d.people[i]+(d.qtys[i]>1?' ×'+d.qtys[i]:'')+': '+n:'').filter(Boolean);
    card.innerHTML='<div><span class="dish-count">×'+d.totalQty+'</span><span class="dish-name">'+d.item.name+'</span></div>'+
      (d.item.en?'<div class="dish-en">'+d.item.en+'</div>':'')+
      '<div class="dish-people">👥 '+d.people.map((p,i)=>p+(d.qtys[i]>1?' ×'+d.qtys[i]:'')).join(' · ')+'</div>'+
      (notesArr.length?'<div class="dish-notes">💬 '+notesArr.join(' · ')+'</div>':'');
    container.appendChild(card);
  });
}

// ============================================================
// REPORT
// ============================================================
function goToReport() {
  document.getElementById('reportTime').textContent=new Date().toLocaleString('he-IL');
  reportCatFilter='all'; reportPersonFilter='all';
  renderReportFilters(); renderReport(); showScreen('reportScreen');
}

function renderReportFilters() {
  const container=document.getElementById('reportFilters'); container.innerHTML='';

  const catBar=document.createElement('div'); catBar.className='filter-bar';
  const allBtn=document.createElement('button');
  allBtn.className='filter-btn'+(reportCatFilter==='all'?' active':'');
  allBtn.textContent='הכל';
  allBtn.onclick=()=>{ reportCatFilter='all'; renderReportFilters(); renderReport(); };
  catBar.appendChild(allBtn);
  currentMenu.forEach(cat => {
    const btn=document.createElement('button');
    btn.className='filter-btn'+(reportCatFilter===cat.id?' active':'');
    btn.textContent=(cat.icon||'')+' '+cat.name;
    btn.onclick=()=>{ reportCatFilter=cat.id; renderReportFilters(); renderReport(); };
    catBar.appendChild(btn);
  });
  container.appendChild(catBar);

  const personBar=document.createElement('div'); personBar.className='filter-bar';
  const allP=document.createElement('button');
  allP.className='filter-btn'+(reportPersonFilter==='all'?' active':'');
  allP.textContent='👥 כולם';
  allP.onclick=()=>{ reportPersonFilter='all'; renderReportFilters(); renderReport(); };
  personBar.appendChild(allP);
  Object.keys(allOrders).filter(u=>Object.keys(allOrders[u]).length>0).forEach(p=>{
    const btn=document.createElement('button');
    btn.className='filter-btn'+(reportPersonFilter===p?' active':'');
    btn.textContent='👤 '+p;
    btn.onclick=()=>{ reportPersonFilter=p; renderReportFilters(); renderReport(); };
    personBar.appendChild(btn);
  });
  container.appendChild(personBar);
}

function renderReport() {
  const content=document.getElementById('reportContent'); content.innerHTML='';

  let filtered={};
  Object.entries(allOrders).forEach(([user,orders])=>{
    if (reportPersonFilter!=='all'&&user!==reportPersonFilter) return;
    filtered[user]={};
    Object.entries(orders).forEach(([id,o])=>{
      const catId=getCategoryId(o.item.id);
      if (reportCatFilter==='all'||catId===reportCatFilter) filtered[user][id]=o;
    });
  });

  const map=buildDishMap(filtered);
  if (!Object.keys(map).length) { content.innerHTML=emptyHTML(); return; }

  const catGroups={};
  Object.values(map).forEach(d=>{ const c=getCategoryId(d.item.id); if(!catGroups[c]) catGroups[c]=[]; catGroups[c].push(d); });

  currentMenu.forEach(cat=>{
    if (!catGroups[cat.id]||!catGroups[cat.id].length) return;
    if (reportCatFilter==='all') {
      const title=document.createElement('div'); title.className='cat-group-title';
      title.textContent=(cat.icon||'')+' '+cat.name; content.appendChild(title);
    }
    catGroups[cat.id].sort((a,b)=>b.totalQty-a.totalQty).forEach(d=>{
      const card=document.createElement('div'); card.className='dish-card';
      const notesArr=d.notes.map((n,i)=>n?d.people[i]+(d.qtys[i]>1?' ×'+d.qtys[i]:'')+': '+n:'').filter(Boolean);
      card.innerHTML='<div><span class="dish-count">×'+d.totalQty+'</span><span class="dish-name">'+d.item.name+'</span></div>'+
        (d.item.en?'<div class="dish-en">'+d.item.en+'</div>':'')+
        '<div class="dish-people">👥 '+d.people.map((p,i)=>p+(d.qtys[i]>1?' ×'+d.qtys[i]:'')).join(', ')+'</div>'+
        (notesArr.length?'<div class="dish-notes">💬 '+notesArr.join(' · ')+'</div>':'');
      content.appendChild(card);
    });
  });

  const h2=document.createElement('div');
  h2.style.cssText='font-family:Frank Ruhl Libre,serif;font-size:1.1rem;margin:1.3rem 0 0.5rem;color:var(--dark)';
  h2.textContent='💰 סה״כ לאדם'; content.appendChild(h2);

  let grand=0;
  Object.entries(filtered).forEach(([user,orders])=>{
    const items=Object.values(orders); if(!items.length) return;
    const total=items.reduce((s,o)=>s+o.item.price*(o.qty||1),0); grand+=total;
    const row=document.createElement('div'); row.className='order-item-row';
    row.style.cssText='background:#fff;padding:0.6rem 0.9rem;border-radius:8px;margin-bottom:0.4rem;';
    row.innerHTML='<div class="order-item-top"><span>👤 '+user+'</span><span class="order-item-price">'+total.toFixed(2)+'€</span></div>';
    content.appendChild(row);
  });
  const gt=document.createElement('div'); gt.className='grand-total-box';
  gt.innerHTML='<span class="grand-total-label">סה״כ כולל</span><span class="grand-total-amount">'+grand.toFixed(2)+'€</span>';
  content.appendChild(gt);
}

// ============================================================
// COPY
// ============================================================
function copyReport() {
  const map=buildDishMap(allOrders);
  let txt='🍽️ '+currentMenuName+' — הזמנות\n'+'─'.repeat(28)+'\n\n';
  Object.values(map).sort((a,b)=>b.totalQty-a.totalQty).forEach(d=>{
    txt+='×'+d.totalQty+'  '+d.item.name+'\n';
    d.people.forEach((p,i)=>{ txt+='   👤 '+p+(d.qtys[i]>1?' ×'+d.qtys[i]:'')+(d.notes[i]?' — '+d.notes[i]:'')+'\n'; });
    txt+='\n';
  });
  txt+='💰 סה״כ לאדם:\n';
  let grand=0;
  Object.entries(allOrders).forEach(([user,orders])=>{
    const items=Object.values(orders); if(!items.length) return;
    const total=items.reduce((s,o)=>s+o.item.price*(o.qty||1),0); grand+=total;
    txt+='👤 '+user+': '+total.toFixed(2)+'€\n';
  });
  txt+='\n💶 סה״כ: '+grand.toFixed(2)+'€\n';
  navigator.clipboard.writeText(txt).then(()=>showToast('✅ הועתק!')).catch(()=>showToast('❌ שגיאה'));
}

// ============================================================
// HELPERS
// ============================================================
function buildDishMap(orders) {
  const map={};
  Object.entries(orders).forEach(([user,userOrders])=>{
    Object.values(userOrders).forEach(o=>{
      const key=o.item.id;
      if(!map[key]) map[key]={item:o.item,people:[],qtys:[],notes:[],totalQty:0};
      map[key].people.push(user); map[key].qtys.push(o.qty||1);
      map[key].notes.push(o.note||''); map[key].totalQty+=(o.qty||1);
    });
  });
  return map;
}

function getCategoryId(itemId) {
  let cid='';
  currentMenu.forEach(cat=>cat.items.forEach(i=>{ if(i.id===Number(itemId)) cid=cat.id; }));
  return cid;
}

function emptyHTML() { return '<div class="empty-state"><span class="emoji">🍽️</span><p>אין הזמנות</p></div>'; }

function setLoading(show, msg) {
  document.getElementById('loadingOverlay').classList[show?'remove':'add']('hidden');
  if (msg) document.getElementById('loadingText').textContent = msg;
}

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  window.scrollTo(0,0);
}

function showToast(msg) {
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2500);
}
</script>
