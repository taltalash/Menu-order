<link href="https://fonts.googleapis.com/css2?family=Frank+Ruhl+Libre:wght@400;700;900&family=Heebo:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>

<style>
  :root {
    --cream: #faf6ef; --warm: #f2ebe0; --gold: #c9a84c;
    --dark: #1a1208; --mid: #4a3828; --light: #8a7060;
    --accent: #b85c38; --green: #4a7c59;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:'Heebo',sans-serif; background:var(--cream); color:var(--dark); min-height:100vh; }

.screen { display:none; min-height:100vh; }
.screen.active { display:block; }

/* NAME SCREEN */
#nameScreen { background:var(–dark); display:flex; flex-direction:column; align-items:center; justify-content:center; padding:2rem; text-align:center; }
#nameScreen.active { display:flex; }
.restaurant-logo { font-family:‘Frank Ruhl Libre’,serif; font-size:3rem; font-weight:900; color:var(–gold); margin-bottom:0.3rem; }
.restaurant-sub { color:var(–light); font-size:0.85rem; letter-spacing:3px; text-transform:uppercase; margin-bottom:3rem; }
.name-card { background:rgba(255,255,255,0.05); border:1px solid rgba(201,168,76,0.3); border-radius:16px; padding:2.5rem 2rem; width:100%; max-width:380px; }
.name-card h2 { font-family:‘Frank Ruhl Libre’,serif; font-size:1.5rem; color:#fff; margin-bottom:0.5rem; }
.name-card p { color:var(–light); font-size:0.9rem; margin-bottom:1.5rem; }
.name-input { width:100%; padding:0.9rem 1rem; background:#fff; border:1px solid rgba(201,168,76,0.4); border-radius:10px; color:#1a1208; font-family:‘Heebo’,sans-serif; font-size:1rem; text-align:right; outline:none; transition:border-color 0.2s; margin-bottom:1rem; }
.name-input:focus { border-color:var(–gold); }
.name-input::placeholder { color:#999; }
.btn-primary { width:100%; padding:1rem; background:var(–gold); color:var(–dark); border:none; border-radius:10px; font-family:‘Heebo’,sans-serif; font-size:1rem; font-weight:700; cursor:pointer; }
.btn-primary:disabled { opacity:0.4; cursor:not-allowed; }

/* SYNC */
.sync-dot { display:inline-block; width:8px; height:8px; border-radius:50%; background:#aaa; margin-left:6px; vertical-align:middle; }
.sync-dot.synced { background:#4a7c59; }
.sync-dot.syncing { background:var(–gold); animation:pulse 1s infinite; }
.sync-dot.error { background:var(–accent); }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

/* MENU HEADER */
.menu-header { background:var(–dark); padding:1.2rem 1.5rem; display:flex; align-items:center; justify-content:space-between; position:sticky; top:0; z-index:100; }
.menu-header-title { font-family:‘Frank Ruhl Libre’,serif; font-size:1.3rem; color:var(–gold); font-weight:700; }
.menu-header-name { color:rgba(255,255,255,0.6); font-size:0.82rem; }
.cart-btn { background:var(–gold); color:var(–dark); border:none; border-radius:50px; padding:0.5rem 1.2rem; font-family:‘Heebo’,sans-serif; font-weight:700; font-size:0.85rem; cursor:pointer; display:flex; align-items:center; gap:0.4rem; }
.cart-count { background:var(–dark); color:var(–gold); border-radius:50%; width:20px; height:20px; display:flex; align-items:center; justify-content:center; font-size:0.75rem; font-weight:900; }

/* ADMIN BAR */
.admin-bar { background:rgba(201,168,76,0.12); border-bottom:1px solid rgba(201,168,76,0.25); padding:0.6rem 1.5rem; font-size:0.82rem; color:var(–mid); display:flex; align-items:center; gap:0.5rem; }
.clear-btn { margin-right:auto; background:#c0392b; color:#fff; border:none; border-radius:50px; padding:0.3rem 0.9rem; font-family:‘Heebo’,sans-serif; font-size:0.75rem; cursor:pointer; }

.category-nav { display:flex; gap:0.5rem; padding:1rem 1.5rem; overflow-x:auto; background:var(–warm); border-bottom:1px solid rgba(0,0,0,0.08); scrollbar-width:none; }
.category-nav::-webkit-scrollbar { display:none; }
.cat-btn { flex-shrink:0; padding:0.4rem 1rem; background:#fff; border:1.5px solid rgba(0,0,0,0.1); border-radius:50px; font-family:‘Heebo’,sans-serif; font-size:0.8rem; font-weight:500; cursor:pointer; transition:all 0.15s; color:var(–mid); white-space:nowrap; }
.cat-btn.active,.cat-btn:hover { background:var(–dark); color:var(–gold); border-color:var(–dark); }

.menu-body { padding:0 0 7rem; }
.category-section { padding:1.5rem 1.5rem 0.5rem; }
.category-title { font-family:‘Frank Ruhl Libre’,serif; font-size:1.4rem; font-weight:700; color:var(–dark); margin-bottom:0.25rem; display:flex; align-items:center; gap:0.5rem; }
.category-title::after { content:’’; flex:1; height:1px; background:var(–gold); opacity:0.4; }
.category-note { font-size:0.8rem; color:var(–light); margin-bottom:1rem; font-style:italic; }
.section-divider { height:8px; background:var(–warm); margin:0.5rem 0; }

/* MENU ITEM */
.menu-item { background:#fff; border-radius:12px; padding:1rem 1.2rem; margin-bottom:0.7rem; display:flex; align-items:flex-start; gap:1rem; border:2px solid transparent; transition:all 0.2s; cursor:pointer; box-shadow:0 1px 4px rgba(0,0,0,0.06); }
.menu-item:hover { border-color:rgba(201,168,76,0.3); }
.menu-item.selected { border-color:var(–green); background:#f0f8f2; }
.item-checkbox { width:26px; height:26px; border-radius:50%; border:2px solid #ddd; display:flex; align-items:center; justify-content:center; flex-shrink:0; transition:all 0.2s; font-size:0.8rem; margin-top:2px; }
.menu-item.selected .item-checkbox { background:var(–green); border-color:var(–green); color:#fff; }
.item-info { flex:1; min-width:0; }
.item-name { font-weight:700; font-size:0.95rem; color:var(–dark); margin-bottom:0.1rem; line-height:1.3; }
.item-name-orig { font-size:0.74rem; color:var(–gold); font-weight:500; margin-bottom:0.15rem; font-style:italic; opacity:0.85; }
.item-desc { font-size:0.78rem; color:var(–light); line-height:1.4; }
.item-note-wrap { margin-top:0.5rem; }
.item-note-input { width:100%; padding:0.35rem 0.7rem; border:1.5px solid #ddd; border-radius:8px; font-family:‘Heebo’,sans-serif; font-size:0.78rem; color:var(–dark); background:#fafafa; outline:none; }
.item-note-input:focus { border-color:var(–gold); }
.item-price { font-family:‘Frank Ruhl Libre’,serif; font-weight:700; font-size:1rem; color:var(–accent); white-space:nowrap; flex-shrink:0; }
.item-size-options { display:flex; gap:0.5rem; margin-top:0.5rem; }
.size-btn { padding:0.2rem 0.7rem; border:1.5px solid #ddd; border-radius:50px; font-size:0.75rem; cursor:pointer; background:#fff; transition:all 0.15s; font-family:‘Heebo’,sans-serif; }
.size-btn.selected { background:var(–green); border-color:var(–green); color:#fff; }

/* PAGES */
.page-header { background:var(–dark); padding:1.5rem; text-align:center; }
.page-header h1 { font-family:‘Frank Ruhl Libre’,serif; font-size:1.8rem; color:var(–gold); }
.page-header p { color:rgba(255,255,255,0.6); font-size:0.85rem; margin-top:0.3rem; }
.page-body { padding:1.5rem; max-width:680px; margin:0 auto; padding-bottom:7rem; }

.tab-bar { display:flex; background:var(–dark); border-radius:50px; padding:0.3rem; margin-bottom:1.5rem; }
.tab-bar-btn { flex:1; padding:0.6rem; border:none; background:transparent; color:rgba(255,255,255,0.5); font-family:‘Heebo’,sans-serif; font-size:0.8rem; font-weight:500; cursor:pointer; border-radius:50px; transition:all 0.2s; }
.tab-bar-btn.active { background:var(–gold); color:var(–dark); font-weight:700; }

/* PERSON CARD */
.person-order { background:#fff; border-radius:14px; padding:1.2rem; margin-bottom:1rem; box-shadow:0 2px 8px rgba(0,0,0,0.07); }
.person-name-row { font-family:‘Frank Ruhl Libre’,serif; font-size:1.1rem; font-weight:700; color:var(–dark); margin-bottom:0.8rem; padding-bottom:0.5rem; border-bottom:1px solid #eee; display:flex; align-items:center; gap:0.5rem; }
.person-total { font-size:0.85rem; color:var(–accent); font-weight:600; margin-right:auto; }

.order-item-row { padding:0.5rem 0; border-bottom:1px dashed #f0ebe3; }
.order-item-row:last-child { border-bottom:none; }
.order-item-top { display:flex; justify-content:space-between; align-items:center; gap:0.5rem; }
.order-item-name { font-size:0.88rem; color:var(–dark); font-weight:600; flex:1; }
.order-item-orig { font-size:0.72rem; color:var(–light); font-style:italic; }
.order-item-right { display:flex; align-items:center; gap:0.4rem; flex-shrink:0; }
.order-item-price { color:var(–accent); font-weight:600; font-size:0.85rem; }
.del-btn { background:none; border:none; color:#ddd; font-size:0.9rem; cursor:pointer; line-height:1; padding:0 0.1rem; }
.del-btn:hover { color:#c0392b; }
.order-item-note { font-size:0.75rem; color:var(–green); margin-top:0.2rem; }
.note-edit { width:100%; margin-top:0.35rem; padding:0.3rem 0.6rem; border:1.5px solid #eee; border-radius:6px; font-family:‘Heebo’,sans-serif; font-size:0.78rem; color:var(–dark); outline:none; background:#fafafa; }
.note-edit:focus { border-color:var(–gold); }

.dish-card { background:#fff; border-radius:14px; padding:1rem 1.2rem; margin-bottom:0.8rem; box-shadow:0 2px 8px rgba(0,0,0,0.07); }
.dish-count { display:inline-block; background:var(–gold); color:var(–dark); border-radius:50px; padding:0.1rem 0.7rem; font-size:0.8rem; font-weight:700; margin-left:0.5rem; }
.dish-name-he { font-weight:700; font-size:1rem; color:var(–dark); }
.dish-name-en { font-size:0.76rem; color:var(–gold); font-style:italic; margin-top:0.2rem; }
.dish-people { font-size:0.82rem; color:var(–light); margin-top:0.4rem; }
.dish-notes { font-size:0.78rem; color:var(–green); margin-top:0.3rem; }

.grand-total-box { background:var(–dark); color:#fff; border-radius:14px; padding:1.2rem 1.5rem; display:flex; justify-content:space-between; align-items:center; margin-top:1.5rem; margin-bottom:1.5rem; }

.empty-state { text-align:center; padding:3rem 1.5rem; color:var(–light); }
.empty-state .emoji { font-size:3rem; margin-bottom:1rem; display:block; }

.float-btn-bar { position:fixed; bottom:0; left:0; right:0; background:rgba(250,246,239,0.96); backdrop-filter:blur(10px); border-top:1px solid rgba(0,0,0,0.08); padding:1rem 1.5rem; display:flex; gap:0.8rem; z-index:200; }
.btn-secondary { flex:1; padding:0.85rem; background:#fff; border:1.5px solid var(–dark); border-radius:10px; font-family:‘Heebo’,sans-serif; font-weight:600; font-size:0.88rem; cursor:pointer; color:var(–dark); }
.btn-success { flex:2; padding:0.85rem; background:var(–green); border:none; border-radius:10px; font-family:‘Heebo’,sans-serif; font-weight:700; font-size:0.92rem; cursor:pointer; color:#fff; }
.btn-gold { flex:1; padding:0.85rem; background:var(–gold); border:none; border-radius:10px; font-family:‘Heebo’,sans-serif; font-weight:700; font-size:0.88rem; cursor:pointer; color:var(–dark); }

.toast { position:fixed; bottom:5.5rem; left:50%; transform:translateX(-50%) translateY(100px); background:var(–dark); color:#fff; padding:0.7rem 1.5rem; border-radius:50px; font-size:0.85rem; z-index:999; transition:transform 0.3s ease; white-space:nowrap; }
.toast.show { transform:translateX(-50%) translateY(0); }

.loading-overlay { position:fixed; inset:0; background:var(–dark); display:flex; flex-direction:column; align-items:center; justify-content:center; z-index:9999; color:#fff; gap:1rem; }
.loading-overlay.hidden { display:none; }
.spinner { width:40px; height:40px; border:3px solid rgba(201,168,76,0.3); border-top-color:var(–gold); border-radius:50%; animation:spin 0.8s linear infinite; }
@keyframes spin { to { transform:rotate(360deg); } }
.loading-text { color:var(–gold); font-family:‘Frank Ruhl Libre’,serif; font-size:1.2rem; }
</style>

</head>

  <div class="float-btn-bar">
    <button class="btn-secondary" onclick="showScreen('menuScreen')">← חזרה</button>
    <button class="btn-gold" onclick="copyReport()">📋 העתק</button>

</div>

let currentUser = '';
let isAdmin = false;
let allOrders = {};
let currentSummaryTab = 'byPerson';

function resolveItem(id) {
  let found = null;
  MENU.forEach(cat => cat.items.forEach(i => { if (i.id === Number(id)) found = i; }));
  return found;
}

function setSyncing() { document.getElementById('syncDot').className = 'sync-dot syncing'; }
function setSynced()  { document.getElementById('syncDot').className = 'sync-dot synced'; }
function setError()   { document.getElementById('syncDot').className = 'sync-dot error'; }

document.addEventListener('DOMContentLoaded', () => {
  const inp = document.getElementById('nameInput');
  const btn = document.getElementById('startBtn');
  inp.addEventListener('input', () => { btn.disabled = inp.value.trim().length < 2; });
  inp.addEventListener('keydown', e => { if (e.key === 'Enter' && !btn.disabled) startOrdering(); });
});

function startOrdering() {
  const name = document.getElementById('nameInput').value.trim();
  if (!name) return;
  currentUser = name;
  isAdmin = (name === 'טל');
  document.getElementById('loadingOverlay').classList.remove('hidden');

  db.ref('orders').on('value', snapshot => {
    const raw = snapshot.val() || {};
    allOrders = {};
    Object.entries(raw).forEach(([user, orders]) => {
      allOrders[user] = {};
      Object.entries(orders).forEach(([itemId, o]) => {
        const item = resolveItem(o.itemId || itemId);
        if (item) allOrders[user][itemId] = { item, size: o.size || null, note: o.note || '' };
      });
    });
    if (!allOrders[currentUser]) allOrders[currentUser] = {};
    setSynced();
    document.getElementById('loadingOverlay').classList.add('hidden');
    document.getElementById('headerName').textContent = 'שלום, ' + currentUser + (isAdmin ? ' 👑' : '') + '!';
    if (isAdmin) document.getElementById('adminBar').style.display = 'flex';

    const onMenu   = document.getElementById('menuScreen').classList.contains('active');
    const onSum    = document.getElementById('summaryScreen').classList.contains('active');
    const onReport = document.getElementById('reportScreen').classList.contains('active');

    if (!onMenu && !onSum && !onReport) { buildMenu(); showScreen('menuScreen'); }
    else {
      if (onMenu) { rebuildMenuSelections(); updateCartCount(); }
      if (onSum)  renderSummary();
      if (onReport) renderReport();
    }
  }, () => {
    setError();
    document.getElementById('loadingOverlay').classList.add('hidden');
    buildMenu(); showScreen('menuScreen');
  });
}

function saveOrders(user) {
  setSyncing();
  const plain = {};
  Object.entries(allOrders[user] || {}).forEach(([id, o]) => {
    plain[id] = { itemId: o.item.id, size: o.size || null, note: o.note || '' };
  });
  const ref = Object.keys(plain).length
    ? db.ref('orders/' + user).set(plain)
    : db.ref('orders/' + user).remove();
  ref.then(setSynced).catch(() => { setError(); showToast('⚠️ שגיאת שמירה'); });
}

function clearAll() {
  if (!confirm('למחוק את כל ההזמנות?')) return;
  db.ref('orders').remove().then(() => showToast('🗑️ כל ההזמנות נמחקו'));
}

// ---- MENU ----
function buildMenu() {
  const nav = document.getElementById('categoryNav');
  const body = document.getElementById('menuBody');
  nav.innerHTML = ''; body.innerHTML = '';
  MENU.forEach((cat, ci) => {
    const btn = document.createElement('button');
    btn.className = 'cat-btn' + (ci === 0 ? ' active' : '');
    btn.textContent = cat.icon + ' ' + cat.name;
    btn.onclick = () => {
      document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      document.getElementById('cat-' + cat.id).scrollIntoView({ behavior:'smooth', block:'start' });
    };
    nav.appendChild(btn);

    const sec = document.createElement('div');
    sec.className = 'category-section'; sec.id = 'cat-' + cat.id;
    const title = document.createElement('div');
    title.className = 'category-title'; title.textContent = cat.icon + ' ' + cat.name;
    sec.appendChild(title);
    if (cat.note) { const n = document.createElement('div'); n.className = 'category-note'; n.textContent = cat.note; sec.appendChild(n); }
    cat.items.forEach(item => sec.appendChild(buildMenuItem(item)));
    body.appendChild(sec);
    if (ci < MENU.length - 1) { const d = document.createElement('div'); d.className = 'section-divider'; body.appendChild(d); }
  });
  updateCartCount();
}

function rebuildMenuSelections() {
  MENU.forEach(cat => cat.items.forEach(item => {
    const el = document.getElementById('item-' + item.id);
    if (el) el.replaceWith(buildMenuItem(item));
  }));
}

function buildMenuItem(item) {
  const order = allOrders[currentUser] || {};
  const entry = order[item.id];
  const sel = !!entry;
  const el = document.createElement('div');
  el.className = 'menu-item' + (sel ? ' selected' : '');
  el.id = 'item-' + item.id;

  const priceStr = item.hasSizes
    ? 'מיני: ' + item.priceMini.toFixed(2) + '€ / רגיל: ' + item.price.toFixed(2) + '€'
    : item.price.toFixed(2) + '€';

  el.innerHTML =
    '<div class="item-checkbox">' + (sel ? '✓' : '') + '</div>' +
    '<div class="item-info">' +
      '<div class="item-name">' + item.name + '</div>' +
      '<div class="item-name-orig">' + item.orig + '</div>' +
      (item.desc ? '<div class="item-desc">' + item.desc + '</div>' : '') +
      (item.hasSizes ?
        '<div class="item-size-options">' +
          '<button class="size-btn ' + (entry && entry.size==='מיני' ? 'selected':'') + '" onclick="selectSize(event,' + item.id + ',\'מיני\')">מיני ' + item.priceMini.toFixed(2) + '€</button>' +
          '<button class="size-btn ' + (entry && entry.size==='רגיל' ? 'selected':'') + '" onclick="selectSize(event,' + item.id + ',\'רגיל\')">רגיל ' + item.price.toFixed(2) + '€</button>' +
        '</div>' : '') +
      (sel ? '<div class="item-note-wrap"><input class="item-note-input" placeholder="💬 הערה (רוטב בצד, ללא בצל...)" value="' + (entry.note||'').replace(/"/g,'&quot;') + '" onchange="updateNote(event,' + item.id + ')" onclick="event.stopPropagation()" /></div>' : '') +
    '</div>' +
    '<div class="item-price">' + priceStr + '</div>';

  if (!item.hasSizes) el.onclick = () => toggleItem(item);
  return el;
}

function toggleItem(item) {
  if (!allOrders[currentUser]) allOrders[currentUser] = {};
  if (allOrders[currentUser][item.id]) delete allOrders[currentUser][item.id];
  else allOrders[currentUser][item.id] = { item, size: null, note: '' };
  saveOrders(currentUser);
  const el = document.getElementById('item-' + item.id);
  if (el) el.replaceWith(buildMenuItem(item));
  updateCartCount();
}

function updateNote(e, itemId) {
  if (allOrders[currentUser] && allOrders[currentUser][itemId]) {
    allOrders[currentUser][itemId].note = e.target.value;
    saveOrders(currentUser);
  }
}

function selectSize(e, itemId, size) {
  e.stopPropagation();
  const item = resolveItem(itemId);
  if (!item || !allOrders[currentUser]) return;
  const existing = allOrders[currentUser][itemId] || {};
  allOrders[currentUser][itemId] = { item, size, note: existing.note || '' };
  saveOrders(currentUser);
  const el = document.getElementById('item-' + item.id);
  if (el) el.replaceWith(buildMenuItem(item));
  updateCartCount();
}

function updateCartCount() {
  document.getElementById('cartCount').textContent = Object.keys(allOrders[currentUser] || {}).length;
}

// ---- SUMMARY ----
function goToSummary() {
  document.getElementById('summaryTime').textContent = new Date().toLocaleString('he-IL');
  renderSummary(); showScreen('summaryScreen');
}

function showSummaryTab(tab) {
  currentSummaryTab = tab;
  document.querySelectorAll('.tab-bar-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('tab-' + tab).classList.add('active');
  renderSummary();
}

function renderSummary() {
  const content = document.getElementById('summaryContent');
  content.innerHTML = '';
  currentSummaryTab === 'byPerson' ? renderByPerson(content) : renderByDish(content);
}

function renderByPerson(container) {
  const users = Object.keys(allOrders);
  if (!users.length) { container.innerHTML = emptyHTML(); return; }
  let grand = 0;
  users.forEach(user => {
    const items = Object.values(allOrders[user]);
    if (!items.length) return;
    const total = items.reduce((s, o) => s + itemPrice(o), 0);
    grand += total;
    const canEdit = user === currentUser || isAdmin;
    const box = document.createElement('div');
    box.className = 'person-order';

    const nameRow = document.createElement('div');
    nameRow.className = 'person-name-row';
    nameRow.innerHTML = '👤 ' + user + '<span class="person-total">' + total.toFixed(2) + '€</span>';
    box.appendChild(nameRow);

    items.forEach(o => {
      const row = document.createElement('div');
      row.className = 'order-item-row';

      const top = document.createElement('div');
      top.className = 'order-item-top';
      top.innerHTML = '<div class="order-item-name">' + o.item.name + (o.size ? ' (' + o.size + ')' : '') +
        '<div class="order-item-orig">' + o.item.orig + '</div></div>';

      const right = document.createElement('div');
      right.className = 'order-item-right';
      right.innerHTML = '<span class="order-item-price">' + itemPrice(o).toFixed(2) + '€</span>';

      if (canEdit) {
        const delBtn = document.createElement('button');
        delBtn.className = 'del-btn';
        delBtn.textContent = '✕';
        delBtn.onclick = () => {
          delete allOrders[user][o.item.id];
          saveOrders(user);
          renderSummary();
          if (user === currentUser) updateCartCount();
        };
        right.appendChild(delBtn);
      }
      top.appendChild(right);
      row.appendChild(top);

      if (canEdit) {
        const noteInp = document.createElement('input');
        noteInp.className = 'note-edit';
        noteInp.placeholder = '💬 הוסף הערה (רוטב בצד, ללא בצל...)';
        noteInp.value = o.note || '';
        noteInp.onchange = e => {
          if (allOrders[user] && allOrders[user][o.item.id]) {
            allOrders[user][o.item.id].note = e.target.value;
            saveOrders(user);
          }
        };
        row.appendChild(noteInp);
      } else if (o.note) {
        const noteDiv = document.createElement('div');
        noteDiv.className = 'order-item-note';
        noteDiv.textContent = '💬 ' + o.note;
        row.appendChild(noteDiv);
      }

      box.appendChild(row);
    });

    container.appendChild(box);
  });

  const gt = document.createElement('div');
  gt.className = 'grand-total-box';
  gt.innerHTML = '<span class="grand-total-label">סה״כ לתשלום</span><span class="grand-total-amount">' + grand.toFixed(2) + '€</span>';
  container.appendChild(gt);
}

function renderByDish(container) {
  const map = buildDishMap();
  if (!Object.keys(map).length) { container.innerHTML = emptyHTML(); return; }
  Object.values(map).sort((a,b) => b.people.length - a.people.length).forEach(d => {
    const card = document.createElement('div');
    card.className = 'dish-card';
    const notesArr = d.notes.map((n,i) => n ? d.people[i] + ': ' + n : '').filter(Boolean);
    card.innerHTML =
      '<div><span class="dish-count">×' + d.people.length + '</span><span class="dish-name-he">' + d.item.name + (d.size ? ' (' + d.size + ')' : '') + '</span></div>' +
      '<div class="dish-name-en">' + d.item.orig + '</div>' +
      '<div class="dish-people">👥 ' + d.people.join(' · ') + '</div>' +
      (notesArr.length ? '<div class="dish-notes">💬 ' + notesArr.join(' · ') + '</div>' : '');
    container.appendChild(card);
  });
}

// ---- REPORT ----
function goToReport() {
  document.getElementById('reportTime').textContent = new Date().toLocaleString('he-IL');
  renderReport(); showScreen('reportScreen');
}

function renderReport() {
  const content = document.getElementById('reportContent');
  content.innerHTML = '';
  const map = buildDishMap();

  const h1 = document.createElement('h3');
  h1.style.cssText = 'font-family:Frank Ruhl Libre,serif;font-size:1.2rem;margin-bottom:1rem;color:var(--dark)';
  h1.textContent = '🍽️ מנות לפי כמות';
  content.appendChild(h1);

  if (!Object.keys(map).length) { content.innerHTML += emptyHTML(); }
  else {
    Object.values(map).sort((a,b) => b.people.length - a.people.length).forEach(d => {
      const card = document.createElement('div');
      card.className = 'dish-card';
      const notesArr = d.notes.map((n,i) => n ? d.people[i] + ': ' + n : '').filter(Boolean);
      card.innerHTML =
        '<div><span class="dish-count">×' + d.people.length + '</span><span class="dish-name-he">' + d.item.name + (d.size ? ' (' + d.size + ')' : '') + '</span></div>' +
        '<div class="dish-name-en">' + d.item.orig + '</div>' +
        '<div class="dish-people">👥 ' + d.people.join(', ') + '</div>' +
        (notesArr.length ? '<div class="dish-notes">💬 ' + notesArr.join(' · ') + '</div>' : '');
      content.appendChild(card);
    });
  }

  const h2 = document.createElement('h3');
  h2.style.cssText = 'font-family:Frank Ruhl Libre,serif;font-size:1.2rem;margin:1.5rem 0 1rem;color:var(--dark)';
  h2.textContent = '💰 סה״כ לאדם';
  content.appendChild(h2);

  let grand = 0;
  Object.entries(allOrders).forEach(([user, orders]) => {
    const items = Object.values(orders);
    if (!items.length) return;
    const total = items.reduce((s, o) => s + itemPrice(o), 0);
    grand += total;
    const row = document.createElement('div');
    row.className = 'order-item-row';
    row.style.cssText = 'background:#fff;padding:0.7rem 1rem;border-radius:8px;margin-bottom:0.5rem;';
    row.innerHTML = '<div class="order-item-top"><span style="font-size:0.95rem">👤 ' + user + '</span><span class="order-item-price" style="font-size:0.95rem">' + total.toFixed(2) + '€</span></div>';
    content.appendChild(row);
  });

  const gt = document.createElement('div');
  gt.className = 'grand-total-box';
  gt.innerHTML = '<span class="grand-total-label">סה״כ כולל</span><span class="grand-total-amount">' + grand.toFixed(2) + '€</span>';
  content.appendChild(gt);
}

// ---- COPY ----
function copyReport() {
  const map = buildDishMap();
  let txt = '🍽️ הזמנות מהמסעדה\n' + '─'.repeat(30) + '\n\n📋 מנות:\n';
  Object.values(map).sort((a,b) => b.people.length - a.people.length).forEach(d => {
    txt += '×' + d.people.length + '  ' + d.item.name + (d.size ? ' (' + d.size + ')' : '') + '\n';
    txt += '   ' + d.item.orig + '\n';
    d.people.forEach((p,i) => { txt += '   👤 ' + p + (d.notes[i] ? ' — ' + d.notes[i] : '') + '\n'; });
    txt += '\n';
  });
  txt += '💰 סה״כ לאדם:\n';
  let grand = 0;
  Object.entries(allOrders).forEach(([user, orders]) => {
    const items = Object.values(orders);
    if (!items.length) return;
    const total = items.reduce((s,o) => s + itemPrice(o), 0);
    grand += total;
    txt += '👤 ' + user + ': ' + total.toFixed(2) + '€\n';
  });
  txt += '\n💶 סה״כ: ' + grand.toFixed(2) + '€\n';
  navigator.clipboard.writeText(txt).then(() => showToast('✅ הועתק!')).catch(() => showToast('❌ שגיאה'));
}

// ---- HELPERS ----
function buildDishMap() {
  const map = {};
  Object.entries(allOrders).forEach(([user, orders]) => {
    Object.values(orders).forEach(o => {
      const key = o.item.id + (o.size||'');
      if (!map[key]) map[key] = { item:o.item, size:o.size, people:[], notes:[] };
      map[key].people.push(user);
      map[key].notes.push(o.note||'');
    });
  });
  return map;
}

function itemPrice(o) { return o.size==='מיני' ? (o.item.priceMini||o.item.price) : o.item.price; }
function emptyHTML() { return '<div class="empty-state"><span class="emoji">🍽️</span><p>אין הזמנות עדיין</p></div>'; }

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  window.scrollTo(0,0);
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}
</script>

</body>
